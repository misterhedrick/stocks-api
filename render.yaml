# Render blueprint - paper trading, Mon-Fri market hours, fully automated.
# Paper-only safeguards: ALPACA_PAPER=true, AUTO_SUBMIT_REQUIRES_PAPER=true.
# Automation is intentionally enabled: TRADING_AUTOMATION_ENABLED=true,
# SCHEDULED_JOBS_ENABLED=true, MARKET_CYCLE_SUBMIT_ENABLED=true.
# Emergency stops: set TRADING_AUTOMATION_ENABLED=false to halt all auto-submit,
# MARKET_CYCLE_SUBMIT_ENABLED=false to halt entry submits while keeping scan/reconcile,
# or SCHEDULED_JOBS_ENABLED=false to stop cron execution entirely.
# Cron schedules are UTC. They approximate Eastern market hours but are NOT
# DST-safe: during EST (Nov-Mar) the 13-20 UTC window maps to 8am-3pm EST,
# missing the 3pm-4pm close. Review and shift schedules around DST transitions.
services:
  - type: web
    name: stocks-api
    env: python
    region: virginia
    plan: starter
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: bash ./start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_NAME
        value: stocks-api
      - key: LOG_LEVEL
        value: INFO
      - key: API_V1_PREFIX
        value: /api/v1
      - key: ADMIN_API_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CONNECT_TIMEOUT_SECONDS
        value: 5
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: true
      - key: ALPACA_REQUEST_TIMEOUT_SECONDS
        value: 10
      - key: AUTO_MIGRATE_ON_STARTUP
        value: true
      - key: MARKET_CYCLE_SCAN_ENABLED
        value: true
      - key: MARKET_CYCLE_RECONCILE_ENABLED
        value: true
      - key: MARKET_CYCLE_PREVIEW_ENABLED
        value: true
      - key: MARKET_CYCLE_EXIT_ENABLED
        value: true
      - key: MARKET_CYCLE_NEWS_ENABLED
        value: false
      - key: MARKET_CYCLE_SUBMIT_ENABLED
        value: true
      - key: NEWS_REQUEST_TIMEOUT_SECONDS
        value: 10
      - key: TRADING_AUTOMATION_ENABLED
        value: true
      - key: AUTO_SUBMIT_REQUIRES_PAPER
        value: true
      # Paper-test limits - loosened to collect more trade data; tighten before live trading.
      - key: MAX_AUTO_ORDERS_PER_CYCLE
        value: 50
      - key: MAX_AUTO_ORDERS_PER_DAY
        value: 1000
      - key: MAX_AUTO_ORDERS_PER_SYMBOL_PER_DAY
        value: 200
      - key: MAX_OPEN_POSITIONS
        value: 200
      - key: MAX_OPEN_POSITIONS_PER_SYMBOL
        value: 50
      - key: MAX_CONTRACTS_PER_ORDER
        value: 1
      - key: MAX_ESTIMATED_PREMIUM_PER_ORDER
        value: 5000
      - key: PAPER_STRATEGY_PREVIEW_PROFILES_ENABLED
        value: true
      - key: PAPER_STRATEGY_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_STRATEGY_MIN_OPEN_INTEREST
        value: 25
      - key: OPTIONS_MIN_OPEN_INTEREST
        value: 25
      - key: OPTIONS_MAX_CONTRACT_NOTIONAL
        value: 5000
      - key: OPTIONS_MAX_SPREAD_PCT
        value: 0.15
      - key: OPTIONS_PREVIEW_MAX_ATTEMPTS
        value: 3
      - key: OPTIONS_CANDIDATE_LIMIT
        value: 100
      - key: OPTIONS_DIAGNOSTIC_CANDIDATE_LIMIT
        value: 10
      - key: PAPER_PREVIEW_PROFILE_PRICE_THRESHOLD_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_PRICE_THRESHOLD_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_PRICE_THRESHOLD_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_PERCENT_CHANGE_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_PERCENT_CHANGE_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_PERCENT_CHANGE_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_MOVING_AVERAGE_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_MOVING_AVERAGE_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_MOVING_AVERAGE_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_TREND_CONFIRMATION_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_TREND_CONFIRMATION_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_TREND_CONFIRMATION_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_MOMENTUM_RATE_OF_CHANGE_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_MOMENTUM_RATE_OF_CHANGE_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_MOMENTUM_RATE_OF_CHANGE_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_RSI_REVERSAL_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_RSI_REVERSAL_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_RSI_REVERSAL_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_MACD_CROSSOVER_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_MACD_CROSSOVER_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_MACD_CROSSOVER_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_MEAN_REVERSION_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_MEAN_REVERSION_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_MEAN_REVERSION_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_BREAKOUT_PRICE_THRESHOLD_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_BREAKOUT_PRICE_THRESHOLD_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_BREAKOUT_PRICE_THRESHOLD_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_VOLUME_CONFIRMED_BREAKOUT_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_VOLUME_CONFIRMED_BREAKOUT_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_VOLUME_CONFIRMED_BREAKOUT_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_VOLATILITY_SQUEEZE_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_VOLATILITY_SQUEEZE_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_VOLATILITY_SQUEEZE_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_PREVIEW_PROFILE_SUPPORT_RESISTANCE_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_SUPPORT_RESISTANCE_MAX_ESTIMATED_NOTIONAL
        value: 5000
      - key: PAPER_PREVIEW_PROFILE_SUPPORT_RESISTANCE_MAX_SPREAD_PERCENT
        value: 35
      - key: SIGNAL_EVALUATORS_ENABLED
        value: true
      - key: MOMENTUM_EVALUATOR_ENABLED
        value: true
      - key: MOVING_AVERAGE_EVALUATOR_ENABLED
        value: true
      - key: RSI_EVALUATOR_ENABLED
        value: true
      - key: MACD_EVALUATOR_ENABLED
        value: true
      - key: MEAN_REVERSION_EVALUATOR_ENABLED
        value: true
      - key: BREAKOUT_PRICE_THRESHOLD_EVALUATOR_ENABLED
        value: true
      - key: VOLUME_CONFIRMED_BREAKOUT_EVALUATOR_ENABLED
        value: true
      - key: VOLATILITY_SQUEEZE_EVALUATOR_ENABLED
        value: true
      - key: SUPPORT_RESISTANCE_EVALUATOR_ENABLED
        value: true
      - key: MARKET_CYCLE_PHASE_TIMEOUT_SECONDS
        value: 90
      - key: PAPER_STRATEGY_MIN_CHANGE_PERCENT
        value: 0.10
      - key: PAPER_STRATEGY_TREND_MIN_CHANGE_PERCENT
        value: 0.35
      - key: PAPER_STRATEGY_MAX_SPREAD
        value: 0.35
      - key: PAPER_STRATEGY_MAX_SPREAD_PERCENT
        value: 35
      - key: PAPER_STRATEGY_PROFIT_TARGET_PERCENT
        value: 25
      - key: PAPER_STRATEGY_STOP_LOSS_PERCENT
        value: 15
      - key: SCHEDULED_JOBS_ENABLED
        value: true
  # Symbol-specific entry crons use the same API and safety guards while keeping
  # option candidate searches smaller per invocation. Scheduled entries come
  # from these split jobs; exits and maintenance stay global.
  - type: cron
    name: stocks-api-market-entry-spy
    env: python
    region: virginia
    plan: starter
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_render_job.py
    schedule: "0-55/5 14-18 * * 1-5"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: SCHEDULED_JOBS_ENABLED
        value: true
      - key: STOCKS_API_BASE_URL
        value: https://stocks-api-z11i.onrender.com
      - key: JOB_PATH
        value: /api/v1/jobs/market-entry-cycle?symbol=SPY&scan_limit=100&order_limit=100&fill_page_size=100
      - key: JOB_TIMEOUT_SECONDS
        value: 120
      - key: JOB_RETRY_DELAYS_SECONDS
        value: ""
      - key: JOB_SKIP_HTTP_STATUS_CODES
        value: 429
      - key: ADMIN_API_TOKEN
        sync: false
  - type: cron
    name: stocks-api-market-entry-qqq
    env: python
    region: virginia
    plan: starter
    branch: master
