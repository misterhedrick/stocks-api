  - type: cron
    name: stocks-api-market-entry-msft
    env: python
    region: virginia
    plan: starter
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_render_job.py
    schedule: "3-55/5 14-18 * * 1-5"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: SCHEDULED_JOBS_ENABLED
        value: true
      - key: STOCKS_API_BASE_URL
