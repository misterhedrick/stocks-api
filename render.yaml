services:
  - type: web
    name: stocks-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash ./start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: ADMIN_API_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: true
      - key: AUTO_MIGRATE_ON_STARTUP
        value: true
      - key: MARKET_CYCLE_SCAN_ENABLED
        value: true
      - key: MARKET_CYCLE_RECONCILE_ENABLED
        value: true
      - key: MARKET_CYCLE_PREVIEW_ENABLED
        value: true
      - key: MARKET_CYCLE_EXIT_ENABLED
        value: true
      - key: MARKET_CYCLE_NEWS_ENABLED
        value: false
      - key: MARKET_CYCLE_SUBMIT_ENABLED
        value: true
      - key: NEWS_REQUEST_TIMEOUT_SECONDS
        value: 10
      - key: TRADING_AUTOMATION_ENABLED
        value: true
      - key: AUTO_SUBMIT_REQUIRES_PAPER
        value: true
      - key: MAX_AUTO_ORDERS_PER_CYCLE
        value: 50
      - key: MAX_AUTO_ORDERS_PER_DAY
        value: 50
      - key: MAX_OPEN_POSITIONS
        value: 100
      - key: MAX_OPEN_POSITIONS_PER_SYMBOL
        value: 100
      - key: MAX_CONTRACTS_PER_ORDER
        value: 1
      - key: MAX_ESTIMATED_PREMIUM_PER_ORDER
        value: 1000
      - key: SCHEDULED_JOBS_ENABLED
        value: true
  - type: cron
    name: stocks-api-market-cycle
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_render_job.py
    schedule: "*/10 * * * *"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: SCHEDULED_JOBS_ENABLED
        value: true
      - key: STOCKS_API_BASE_URL
        value: https://stocks-api-z11i.onrender.com
      - key: JOB_PATH
        value: /api/v1/jobs/market-cycle?scan_limit=100&order_limit=100&fill_page_size=100
      - key: JOB_TIMEOUT_SECONDS
        value: 240
      - key: JOB_SKIP_HTTP_STATUS_CODES
        value: 429
      - key: ADMIN_API_TOKEN
        sync: false
  - type: cron
    name: stocks-api-market-maintenance
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_render_job.py
    schedule: "15 13,21 * * 1-5"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: SCHEDULED_JOBS_ENABLED
        value: true
      - key: STOCKS_API_BASE_URL
        value: https://stocks-api-z11i.onrender.com
      - key: JOB_PATH
        value: /api/v1/jobs/market-maintenance?phase=auto&news_enabled=true
      - key: JOB_TIMEOUT_SECONDS
        value: 240
      - key: ADMIN_API_TOKEN
        sync: false
