        value: 3.13.13
      - key: SCHEDULED_JOBS_ENABLED
        value: true
      - key: STOCKS_API_BASE_URL
        value: https://stocks-api-z11i.onrender.com
      - key: JOB_PATH
        value: /api/v1/jobs/market-entry-cycle?symbol=AAPL&scan_limit=100&order_limit=100&fill_page_size=100
      - key: JOB_TIMEOUT_SECONDS
