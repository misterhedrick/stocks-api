# Render blueprint — paper trading, Mon-Fri market hours, fully automated.
# Paper-only safeguards: ALPACA_PAPER=true, AUTO_SUBMIT_REQUIRES_PAPER=true.
# Automation is intentionally enabled: TRADING_AUTOMATION_ENABLED=true,
# SCHEDULED_JOBS_ENABLED=true, MARKET_CYCLE_SUBMIT_ENABLED=true.
# Emergency stops: set TRADING_AUTOMATION_ENABLED=false to halt all auto-submit,
# MARKET_CYCLE_SUBMIT_ENABLED=false to halt entry submits while keeping scan/reconcile,
# or SCHEDULED_JOBS_ENABLED=false to stop cron execution entirely.
# Cron schedules are UTC. They approximate Eastern market hours but are NOT
# DST-safe: during EST (Nov-Mar) the 13-20 UTC window maps to 8am-3pm EST,
# missing the 3pm-4pm close. Review and shift schedules around DST transitions.
services:
  - type: web
    name: stocks-api
    env: python
    region: virginia
    plan: free
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: bash ./start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_NAME
        value: stocks-api
      - key: LOG_LEVEL
        value: INFO
      - key: API_V1_PREFIX
        value: /api/v1
      - key: ADMIN_API_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CONNECT_TIMEOUT_SECONDS
        value: 5
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_PAPER
        value: true
      - key: ALPACA_REQUEST_TIMEOUT_SECONDS
        value: 10
      - key: AUTO_MIGRATE_ON_STARTUP
        value: true
      - key: MARKET_CYCLE_SCAN_ENABLED
        value: true
      - key: MARKET_CYCLE_RECONCILE_ENABLED
        value: true
      - key: MARKET_CYCLE_PREVIEW_ENABLED
        value: true
      - key: MARKET_CYCLE_EXIT_ENABLED
        value: true
      - key: MARKET_CYCLE_NEWS_ENABLED
        value: false
      - key: MARKET_CYCLE_SUBMIT_ENABLED
        value: true
      - key: NEWS_REQUEST_TIMEOUT_SECONDS
        value: 10
      - key: TRADING_AUTOMATION_ENABLED
        value: true
      - key: AUTO_SUBMIT_REQUIRES_PAPER
        value: true
      # Moderate daily limits — enough trades to collect data; avoids runaway correlated positions.
      - key: MAX_AUTO_ORDERS_PER_CYCLE
        value: 3
      - key: MAX_AUTO_ORDERS_PER_DAY
        value: 50
      - key: MAX_OPEN_POSITIONS
        value: 25
      - key: MAX_OPEN_POSITIONS_PER_SYMBOL
        value: 3
      - key: MAX_CONTRACTS_PER_ORDER
        value: 1
      - key: MAX_ESTIMATED_PREMIUM_PER_ORDER
        value: 3000
      - key: PAPER_STRATEGY_PREVIEW_PROFILES_ENABLED
        value: true
      - key: PAPER_STRATEGY_MAX_ESTIMATED_NOTIONAL
        value: 3000
      - key: PAPER_STRATEGY_MIN_OPEN_INTEREST
        value: 50
      - key: PAPER_PREVIEW_PROFILE_PRICE_THRESHOLD_MIN_OPEN_INTEREST
        value: 50
      - key: PAPER_PREVIEW_PROFILE_PRICE_THRESHOLD_MAX_ESTIMATED_NOTIONAL
        value: 3000
      - key: PAPER_PREVIEW_PROFILE_PRICE_THRESHOLD_MAX_SPREAD_PERCENT
        value: 20
      - key: PAPER_PREVIEW_PROFILE_PERCENT_CHANGE_MIN_OPEN_INTEREST
        value: 25
      - key: PAPER_PREVIEW_PROFILE_PERCENT_CHANGE_MAX_ESTIMATED_NOTIONAL
        value: 2500
      - key: PAPER_PREVIEW_PROFILE_PERCENT_CHANGE_MAX_SPREAD_PERCENT
        value: 30
      - key: PAPER_PREVIEW_PROFILE_MOVING_AVERAGE_MIN_OPEN_INTEREST
        value: 50
      - key: PAPER_PREVIEW_PROFILE_MOVING_AVERAGE_MAX_ESTIMATED_NOTIONAL
        value: 3000
      - key: PAPER_PREVIEW_PROFILE_MOVING_AVERAGE_MAX_SPREAD_PERCENT
        value: 20
      - key: PAPER_PREVIEW_PROFILE_TREND_CONFIRMATION_MIN_OPEN_INTEREST
        value: 50
      - key: PAPER_PREVIEW_PROFILE_TREND_CONFIRMATION_MAX_ESTIMATED_NOTIONAL
        value: 3500
      - key: PAPER_PREVIEW_PROFILE_TREND_CONFIRMATION_MAX_SPREAD_PERCENT
        value: 20
      - key: PAPER_PREVIEW_PROFILE_MOMENTUM_RATE_OF_CHANGE_MIN_OPEN_INTEREST
        value: 50
      - key: PAPER_PREVIEW_PROFILE_MOMENTUM_RATE_OF_CHANGE_MAX_ESTIMATED_NOTIONAL
        value: 3000
      - key: PAPER_PREVIEW_PROFILE_MOMENTUM_RATE_OF_CHANGE_MAX_SPREAD_PERCENT
        value: 20
      - key: SIGNAL_EVALUATORS_ENABLED
        value: true
      - key: MOMENTUM_EVALUATOR_ENABLED
        value: true
      - key: MARKET_CYCLE_PHASE_TIMEOUT_SECONDS
        value: 70
      - key: PAPER_STRATEGY_MIN_CHANGE_PERCENT
        value: 0.10
      - key: PAPER_STRATEGY_TREND_MIN_CHANGE_PERCENT
        value: 0.35
      - key: PAPER_STRATEGY_MAX_SPREAD
        value: 0.20
      - key: PAPER_STRATEGY_MAX_SPREAD_PERCENT
        value: 20
      - key: PAPER_STRATEGY_PROFIT_TARGET_PERCENT
        value: 25
      - key: PAPER_STRATEGY_STOP_LOSS_PERCENT
        value: 15
      - key: SCHEDULED_JOBS_ENABLED
        value: true
  # Entry market-cycle cron: scan/reconcile/preview/submit every 5 min.
  # 14-21 UTC covers 10am-5pm EDT (UTC-4) and 9am-4pm EST (UTC-5).
  # strategy scanner.submit.trade_windows (10:00-16:00 ET) blocks submissions
  # outside the target window in both seasons, so the extra cron coverage is safe.
  # DST caveat: during EST, 9am ET is one hour early but trade_windows blocks entry.
  # During EDT, the cron runs until 5pm ET; trade_windows stops entries at 4pm ET.
  - type: cron
    name: stocks-api-market-cycle
    env: python
    region: virginia
    plan: starter
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_render_job.py
    schedule: "*/5 14-19 * * 1-5"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: SCHEDULED_JOBS_ENABLED
        value: true
      - key: STOCKS_API_BASE_URL
        value: https://stocks-api-z11i.onrender.com
      - key: JOB_PATH
        value: /api/v1/jobs/market-cycle?scan_limit=100&order_limit=100&fill_page_size=100
      - key: JOB_TIMEOUT_SECONDS
        value: 300
      - key: JOB_RETRY_DELAYS_SECONDS
        value: 60,180
      - key: JOB_SKIP_HTTP_STATUS_CODES
        value: 429
      - key: ADMIN_API_TOKEN
        sync: false
  # Exit-only cron: reconcile+exit-eval every 1 min for fast position protection.
  # Same UTC window and DST caveat as the entry cron above.
  - type: cron
    name: stocks-api-market-exits
    env: python
    region: virginia
    plan: starter
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_render_job.py
    schedule: "*/1 13-20 * * 1-5"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: SCHEDULED_JOBS_ENABLED
        value: true
      - key: STOCKS_API_BASE_URL
        value: https://stocks-api-z11i.onrender.com
      - key: JOB_PATH
        value: /api/v1/jobs/market-cycle-exits?limit=100&order_limit=100&fill_page_size=100&phase_timeout_seconds=45
      - key: JOB_TIMEOUT_SECONDS
        value: 180
      - key: JOB_RETRY_DELAYS_SECONDS
        value: 60,180
      - key: JOB_SKIP_HTTP_STATUS_CODES
        value: 429
      - key: ADMIN_API_TOKEN
        sync: false
  # Maintenance cron: pre/post-market at 12:30 and 21:30 UTC.
  # 12:30 UTC = 8:30am EDT / 7:30am EST. 21:30 UTC = 5:30pm EDT / 4:30pm EST.
  # Post-market run also auto-populates trade_cases (limit=5000).
  - type: cron
    name: stocks-api-market-maintenance
    env: python
    region: virginia
    plan: starter
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_render_job.py
    schedule: "30 12,21 * * 1-5"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: SCHEDULED_JOBS_ENABLED
        value: true
      - key: STOCKS_API_BASE_URL
        value: https://stocks-api-z11i.onrender.com
      - key: JOB_PATH
        value: /api/v1/jobs/market-maintenance?phase=auto&news_enabled=false
      - key: JOB_TIMEOUT_SECONDS
        value: 600
      - key: JOB_RETRY_DELAYS_SECONDS
        value: 60,180,300,600,900
      - key: ADMIN_API_TOKEN
        sync: false
