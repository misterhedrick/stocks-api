services:
  - type: web
    name: stocks-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ADMIN_API_TOKEN
        sync: false
