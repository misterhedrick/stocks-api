services:
  - type: web
    name: stocks-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENV
        value: prod
      - key: DEBUG
        value: false
      - key: API_V1_PREFIX
        value: /api/v1

  - type: cron
    name: stocks-api-market-loop
    runtime: python
    schedule: '*/5 13-20 * * 1-5'
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.workers.market_hours_job

  - type: cron
    name: stocks-api-daily-maintenance
    runtime: python
    schedule: '0 13,21 * * 1-5'
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.workers.daily_maintenance_job
