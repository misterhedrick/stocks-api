name: Update Strategy Stop Loss

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without writing changes
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      include_inactive:
        description: Include inactive strategies
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      stop_loss_percent:
        description: "Stop loss percent (default: 10)"
        required: false
        default: "10"
      stop_loss_min_dollars:
        description: "Minimum dollar loss to trigger stop (default: 20)"
        required: false
        default: "20"

jobs:
  update-strategy-stop-loss:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL repository secret is required."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stop loss patch
        run: |
          ARGS="--stop-loss-percent ${{ inputs.stop_loss_percent }} --stop-loss-min-dollars ${{ inputs.stop_loss_min_dollars }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.include_inactive }}" = "true" ]; then ARGS="$ARGS --all"; fi

          python scripts/update_strategy_stop_loss.py $ARGS
